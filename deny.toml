# cargo-deny configuration. Run via: cargo deny check
# Wired into scripts/verify.sh.

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "GPL-3.0-only",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "BSL-1.0",
    # Bundled fonts in epaint_default_fonts (Ubuntu Mono + others).
    "OFL-1.1",
    "Ubuntu-font-1.0",
]
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "warn"
workspace-default-features = "allow"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
